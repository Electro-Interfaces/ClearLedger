# ============================================================
# ClearLedger Server — dev-режим (только бэкенд + БД)
# Для полного стека используйте docker-compose.yml в корне проекта.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: clearledger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearledger
      POSTGRES_PASSWORD: clearledger
      POSTGRES_DB: clearledger
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clearledger-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clearledger:clearledger@postgres:5432/clearledger
      SECRET_KEY: ${SECRET_KEY:-clearledger-dev-secret}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      OCR_ENABLED: "true"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

volumes:
  pgdata:
  uploads:
