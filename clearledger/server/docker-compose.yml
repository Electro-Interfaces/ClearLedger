version: "3.9"

services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: clearledger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearledger
      POSTGRES_PASSWORD: clearledger
      POSTGRES_DB: clearledger
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clearledger-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clearledger:clearledger@postgres:5432/clearledger
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}
      OCR_ENABLED: ${OCR_ENABLED:-true}
    ports:
      - "8000:8000"

  # Nginx — reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: clearledger-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SPA статика (после npm run build)
      - ../dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
